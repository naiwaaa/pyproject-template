[flake8]
extend-exclude =.cache/,.venv/
select =
  # flake8-aaa
  AAA,
  # flake8-type-checking
  TC,
  TC1,
  # darglint
  DAR

# flake8-type-checking
type-checking-pydantic-enabled = true
type-checking-pydantic-enabled-baseclass-passlist = NamedTuple, TypedDict

[darglint]
docstring_style = google
strictness = short
enable = DAR104
